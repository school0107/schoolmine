name: SchoolMine
version: 1.0.0
main: com.schoolmine.SchoolMine
api-version: '1.21'
softdepend: [PlayerPoints]
authors: [school0107]
description: SchoolMine core plugin with advanced mining features.

commands:
  schoolmine:
    description: Lenh quan tri plugin SchoolMine.
    permission: schoolmine.admin
    usage: /schoolmine [reload|status|help]
  autopickup:
    description: Bat tat tu dong nhat do.
    permission: schoolmine.autopickup
    usage: /autopickup [on|off]
  autosmelt:
    description: Bat tat tu dong nung quang.
    permission: schoolmine.autosmelt
    usage: /autosmelt [on|off]
  3x3:
    description: Bat tat che do dao 3x3.
    permission: schoolmine.3x3
    usage: /3x3 [on|off]
  automine:
    description: Bat tat che do tu dong dao khoang san xung quanh.
    permission: schoolmine.automine
    usage: /automine [on|off]
  booster:
    description: Mo menu mua booster bang PlayerPoints.
    permission: schoolmine.booster
    usage: /booster
