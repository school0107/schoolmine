# SchoolMine Booster Configuration
# Mua booster bằng PlayerPoints

boosters:
  mining-3x3:
    personal:
      price-5m: 5
      price-10m: 10
      price-30m: 25
      price-2h: 100
    server:
      price-5m: 10
      price-10m: 25
      price-30m: 60
      price-2h: 240
  multi-block:
    personal:
      price-5m: 5
      price-10m: 10
      price-30m: 25
      price-2h: 100
    server:
      price-5m: 10
      price-10m: 25
      price-30m: 60
      price-2h: 240
  nuker:
    personal:
      price-5m: 10
      price-10m: 20
      price-30m: 60
      price-2h: 200
    server:
      price-5m: 15
      price-10m: 40
      price-30m: 200
      price-2h: 400
  kill-shard:
    personal:
      price-5m: 10
      price-10m: 20
      price-30m: 60
      price-2h: 200
    server:
      price-5m: 15
      price-10m: 40
      price-30m: 200
      price-2h: 400

nuker:
  radius: 4
  require-pickaxe: true
  only-above-feet: true
  # Nếu người chơi có quyền schoolmine.autosmelt thì tự nung block nuker phá
  apply-autosmelt: true
  whitelist:
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    - NETHER_GOLD_ORE
    - NETHER_QUARTZ_ORE
    - ANCIENT_DEBRIS
  max-blocks-per-check: 25
  check-interval-ticks: 15

# =============================================
# KILL SHARD Settings
# Khi kill player sẽ chạy lệnh cho người kill
# =============================================
kill-shard:
  # Lệnh chạy khi kill (dùng {player} = tên người kill, {victim} = tên người bị kill)
  # Lệnh chạy từ console (không cần /)
  commands:
    - "give {player} minecraft:amethyst_shard 3"
  # Thông báo cho người kill
  message: "&a+3 &dAmethyst Shard &avì đã kill &e{victim}&a!"

server-booster-title:
  enabled: true
  title: "&6&l⚡ SERVER BOOSTER ⚡"
  subtitle: "&e{player} &7đã kích hoạt &a{type} &7cho server! &7(&e{duration}&7)"
  fade-in: 10
  stay: 60
  fade-out: 10

