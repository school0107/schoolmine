# ==============================================================================
#                               SCHOOLMINE CONFIGURATION
# ==============================================================================

# Hệ thống tin nhắn hiển thị trong Server (Hỗ trợ mã màu &)
messages:
  prefix: "&8[&6SchoolMine&8] &r"
  no-permission: "&cBạn không có quyền thực hiện hành động này!"
  reload-success: "&aĐã tải lại cấu hình config.yml và booster.yml thành công."
  autopickup-on: "&aĐã BẬT tính năng tự động nhặt đồ."
  autopickup-off: "&cĐã TẮT tính năng tự động nhặt đồ."
  autosmelt-on: "&aĐã BẬT tính năng tự động nung quặng."
  autosmelt-off: "&cĐã TẮT tính năng tự động nung quặng."
  mining3x3-on: "&aĐã BẬT chế độ đào quặng diện rộng 3x3."
  mining3x3-off: "&cĐã TẮT chế độ đào quặng diện rộng 3x3."
  automine-on: "&aĐã BẬT chế độ tự động đào khoáng sản quanh người."
  automine-off: "&cĐã TẮT chế độ tự động đào khoáng sản quanh người."

# TÍNH NĂNG 1: AUTO PICKUP
auto-pickup:
  default-enabled: true
  # Vật phẩm nằm trong danh sách này sẽ không tự động hút thẳng vào kho đồ
  blacklist:
    - STONE
    - DIRT
    - GRAVEL
    - COBBLESTONE
    - SAND
    - NETHERRACK
    - FLINT

# TÍNH NĂNG 2: 3x3 MINING
3x3-mining:
  default-enabled: false
  # Chỉ các khối nằm trong whitelist này mới kích nổ hiệu ứng lan 3x3 để tránh nát map
  whitelist:
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    - NETHER_GOLD_ORE
    - NETHER_QUARTZ_ORE
    - ANCIENT_DEBRIS
    - COAL_BLOCK
    - IRON_BLOCK
    - COPPER_BLOCK
    - GOLD_BLOCK
    - REDSTONE_BLOCK
    - LAPIS_BLOCK
    - DIAMOND_BLOCK
    - EMERALD_BLOCK
    - NETHERITE_BLOCK

# TÍNH NĂNG 3: AUTO SMELT (Bản đồ chuyển đổi quặng thô sang thỏi thành phẩm)
auto-smelt:
  default-enabled: true
  smelt-map:
    RAW_IRON: IRON_INGOT
    RAW_GOLD: GOLD_INGOT
    RAW_COPPER: COPPER_INGOT
    IRON_ORE: IRON_INGOT
    DEEPSLATE_IRON_ORE: IRON_INGOT
    GOLD_ORE: GOLD_INGOT
    DEEPSLATE_GOLD_ORE: GOLD_INGOT
    COPPER_ORE: COPPER_INGOT
    DEEPSLATE_COPPER_ORE: COPPER_INGOT

# TÍNH NĂNG 4 & 5: AUTO MINE
auto-mine:
  default-radius: 2

# TÍNH NĂNG 6: BLOCK REMOVE QUEUE (Hàng đợi xóa khối đặt tự động)
block-remove:
  enabled: true
  # Thời gian đếm ngược (giây) trước khi biến mất hoàn toàn
  delay-seconds: 120
  # Khoảng thời gian quét kiểm tra hàng đợi (40 ticks = 2 giây một lần để tiết kiệm CPU)
  check-interval-ticks: 40
  max-queue-size: 100000
  persist-on-restart: true
  # Danh sách thế giới áp dụng cơ chế tự dọn dẹp khối đặt (Để trống nếu áp dụng tất cả)
  world-whitelist:
    - mine_world
    - resource_world
  # Khối block đặc biệt không bị tự động xóa khi đặt ra
  blacklist:
    - CHEST
    - ENDER_CHEST
    - BEDROCK
