name: Build SchoolMine Plugin

on:
  push:
    branches: [ "main", "master" ] # Tự động build khi bạn push code lên nhánh chính
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Cho phép bạn bấm nút tự tay Build bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy mã nguồn từ repo về máy ảo GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Thiết lập môi trường Java 21 (Theo đúng yêu cầu plugin)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Thực hiện biên dịch và đóng gói thành file .jar
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Bước 4: Đẩy file .jar đã build lên mục Artifact để bạn tải về
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SchoolMine-Jar-File
        path: target/*.jar
